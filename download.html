<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download App</title>

<style>
body {
    background-color: #0d1117;
    color: white;
    font-family: Arial;
    text-align: center;
    padding-top: 80px;
}

.container {
    max-width: 400px;
    margin: auto;
}

h1 {
    margin-bottom: 10px;
}

.version {
    color: #aaa;
    margin-bottom: 25px;
}

.download-btn {
    background-color: #28a745;
    color: white;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
}

.download-btn:hover {
    background-color: #218838; 
}

.note {
    margin-top: 20px;
    font-size: 14px;
    color: #aaa;
}

.warning {
    margin-top: 15px;
    font-size: 13px;
    color: #facc15;
}
</style>

</head>

<body>

<div class="container">
    <h1>Communicator App</h1>
    <div class="version">Version 1.0</div>

    <a href="https://raw.githubusercontent.com/dackello77-cloud/y_r/main/y_r_v1.apk" download>
    <button class="download-btn">📲 Download App</button>
</a>

    <p class="note">
        Click the button to download and install the app.
    </p>

    <p class="warning">
        ⚠ If install is blocked, enable "Install unknown apps" in your phone settings.
    </p>
</div>

</body>
</html>
